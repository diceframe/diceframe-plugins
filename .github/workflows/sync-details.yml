name: Sync plugin releases

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: plugin-registry-write
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/sync-details.cjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit changed metadata
        run: |
          git config user.name "diceframe-registry[bot]"
          git config user.email "diceframe-registry[bot]@users.noreply.github.com"
          git add plugin_details.json
          if git diff --staged --quiet; then
            echo "No metadata changes"
          else
            git commit -m "Sync plugin release metadata"
            git push
          fi
